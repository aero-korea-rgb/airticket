<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 항공권 정산 신청서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; padding: 20px; }
        
        #capture-area { 
            width: 950px; 
            min-width: 950px;
            margin: 0 auto; 
            background: white; 
            padding: 0px 40px 40px 40px;
            box-sizing: border-box;
        }

        .form-header { border-bottom: 3px solid #1e40af; }
        .data-table { border-collapse: collapse; width: 100%; font-size: 13px; table-layout: fixed; }
        .data-table th { background-color: #374151; color: white; padding: 10px 2px; border: 1px solid #d1d5db; }
        .data-table td { padding: 4px; border: 1px solid #d1d5db; text-align: center; }
        
        /* 입력 필드 스타일 강화 */
        .data-table input, .data-table select { 
            width: 100%; border: 1px solid transparent; padding: 8px 2px; 
            text-align: center; background-color: #f9fafb; font-size: 13px; outline: none;
            border-radius: 4px; transition: all 0.2s;
        }
        .data-table input:hover { border-color: #d1d5db; }
        .data-table input:focus { background-color: #fff; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        
        /* 금액 입력칸 우측 정렬 */
        .money-input { text-align: right !important; padding-right: 8px !important; }
        
        .total-row { background-color: #fffbeb !important; font-weight: bold; }
        #dropZone.drag-over { border-color: #3b82f6; background-color: #eff6ff; }

        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding: 0 !important; }
            #capture-area { box-shadow: none !important; margin: 0 !important; width: 100% !important; }
        }
    </style>
</head>
<body>

    <div id="capture-area" class="shadow-2xl rounded-xl">
        <div class="form-header p-10 bg-white">
            <div class="text-center">
                <h1 class="text-4xl font-extrabold text-gray-900 mb-2">직원항공권 정산 신청서</h1>
                <p class="text-sm text-blue-600 font-bold tracking-widest">AIRFARE REIMBURSEMENT FORM</p>
            </div>
        </div>

        <div class="p-8">
            <div class="grid grid-cols-4 gap-4 mb-8 bg-gray-50 p-6 rounded-lg border border-gray-200">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-gray-500">신청일</label>
                    <input type="text" id="applicationDate" class="font-semibold text-gray-800 bg-transparent text-center outline-none" readonly>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-gray-500">사번</label>
                    <input type="text" id="employeeId" oninput="this.value = this.value.toUpperCase()" class="font-bold text-blue-800 border-b border-gray-300 focus:border-blue-500 outline-none text-center bg-transparent" placeholder="사번 입력">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-gray-500">성명</label>
                    <input type="text" id="applicantName" class="font-bold text-gray-800 border-b border-gray-300 focus:border-blue-500 outline-none text-center bg-transparent" placeholder="성명 입력">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-gray-500">신청자 이메일</label>
                    <input type="email" id="applicantEmail" class="font-medium text-gray-800 border-b border-gray-300 focus:border-blue-500 outline-none text-center bg-transparent" placeholder="email@kau.ac.kr">
                </div>
            </div>

            <div class="mb-4 flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-700"><i class="fas fa-list-ul mr-2"></i>신청 상세 내역</h2>
                <button type="button" onclick="addPassengerRow()" class="no-print bg-gray-800 text-white px-4 py-1.5 rounded-lg text-xs hover:bg-black transition-colors">+ 내역 추가</button>
            </div>
            
            <div class="border-t-2 border-gray-800">
                <table class="data-table" id="passengerTable">
                    <thead>
                        <tr>
                            <th width="35">No</th>
                            <th width="140">탑승일자(왕복)</th>
                            <th width="110">구간(왕복)</th>
                            <th width="75">관계</th>
                            <th width="85">성명</th>
                            <th width="100">항공운임(왕복)(a)</th>
                            <th width="100">유류세(왕복)(b)</th>
                            <th width="70">지원비율(c)</th>
                            <th width="110">신청금액</th>
                            <th width="45" class="no-print">삭제</th>
                        </tr>
                    </thead>
                    <tbody id="passengerTableBody"></tbody>
                    <tfoot>
                        <tr class="total-row text-lg">
                            <td colspan="5" class="py-5 text-right pr-6 text-gray-600">합계 (KRW)</td>
                            <td id="totalFareDisplay" class="money-input text-sm">0</td>
                            <td id="totalFuelDisplay" class="money-input text-sm">0</td>
                            <td colspan="2" id="totalApplicationDisplay" class="text-blue-700 text-right pr-6 text-xl font-bold">0</td>
                            <td class="no-print"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="mt-8 p-5 border-l-4 border-blue-500 bg-blue-50 rounded-r-lg text-sm text-blue-800">
                <p class="font-semibold"><i class="fas fa-info-circle mr-2"></i>안내사항</p>
                <p class="mt-1">위와 같이 항공료 정산을 신청하며, 첨부된 증빙 서류는 원본과 다름없음을 확인합니다.</p>
            </div>
        </div>
    </div>

    <div class="max-w-[950px] mx-auto mt-6 no-print">
        <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
            <h3 class="font-bold mb-4"><i class="fas fa-paperclip mr-2 text-blue-500"></i>증빙 파일 첨부</h3>
            <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-8 bg-gray-50 text-center hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer">
                <input type="file" id="fileInput" multiple class="hidden" accept="image/*,.pdf">
                <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-3"></i>
                <p class="text-gray-600 font-medium">증빙 파일(모바일 or 실물 탑승권, 탑승확인서, 영수증 등)을 드래그하거나 클릭하여 선택하세요.</p>
                <p class="text-xs text-gray-400 mt-2">JPG, PNG, PDF 지원 (최대 10MB)</p>
            </div>
            <div id="fileList" class="mt-4 grid grid-cols-2 gap-2 text-sm"></div>
        </div>

        <div class="flex justify-center gap-4 mt-8 mb-20">
            <button onclick="window.print()" class="px-8 py-4 bg-white text-gray-700 border border-gray-300 rounded-xl font-bold hover:bg-gray-50 transition-all">인쇄 미리보기</button>
            <button id="submitBtn" onclick="submitData()" class="px-16 py-4 bg-blue-600 text-white rounded-xl font-extrabold hover:bg-blue-700 shadow-xl transition-all">
                신청서 제출 및 PDF 전송
            </button>
        </div>
    </div>

    <script>
        const formatNumber = (num) => num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        const parseNumber = (str) => parseInt(str.toString().replace(/,/g, "") || 0);
        let selectedFiles = [];

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            document.getElementById('applicationDate').value = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;
            addPassengerRow();
            initFileUpload();
        });

        function initFileUpload() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                handleFiles(e.dataTransfer.files);
            });
            fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); });
        }

        function handleFiles(files) {
            const list = document.getElementById('fileList');
            Array.from(files).forEach(file => {
                if (selectedFiles.some(f => f.name === file.name && f.size === file.size)) return;
                selectedFiles.push(file);
                const fileItem = document.createElement('div');
                fileItem.className = "flex justify-between items-center bg-gray-50 p-2.5 rounded border border-gray-200";
                fileItem.innerHTML = `
                    <span class="truncate pr-4 text-gray-700"><i class="far fa-file-alt mr-2 text-blue-400"></i>${file.name}</span>
                    <button type="button" onclick="removeFile('${file.name}', this)" class="text-red-400 hover:text-red-600 font-bold px-2">×</button>
                `;
                list.appendChild(fileItem);
            });
        }

        function removeFile(fileName, btn) {
            selectedFiles = selectedFiles.filter(f => f.name !== fileName);
            btn.parentElement.remove();
        }

        function updateRowNumbers() {
            document.querySelectorAll('.passenger-row').forEach((row, index) => {
                row.querySelector('.seq-num').innerText = index + 1;
            });
        }

        function addPassengerRow() {
            const tbody = document.getElementById('passengerTableBody');
            const row = tbody.insertRow();
            row.className = "passenger-row";
            row.innerHTML = `
                <td class="seq-num font-bold text-gray-400">${tbody.rows.length}</td>
                <td><input type="text" class="travel-date" placeholder="YYYY.MM.DD-MM.DD"></td>
                <td><input type="text" class="flight-route" placeholder="CJU-GMP-CJU"></td>
                <td>
                    <select class="relationship">
                        <option>본인</option><option>배우자</option><option>자녀</option><option>부모</option>
                    </select>
                </td>
                <td><input type="text" class="passenger-name" placeholder="성명"></td>
                <td><input type="text" class="val-a money-input" oninput="handleMoney(this)" value="0"></td>
                <td><input type="text" class="val-b money-input" oninput="handleMoney(this)" value="0"></td>
                <td>
                    <select class="val-c" onchange="calculate()">
                        <option value="0.8">80%</option><option value="0.5">50%</option>
                    </select>
                </td>
                <td><input type="text" class="row-total money-input font-bold text-blue-600" readonly value="0"></td>
                <td class="no-print">
                    <button onclick="this.closest('tr').remove(); updateRowNumbers(); calculate();" class="text-gray-300 hover:text-red-500 px-2 font-bold text-xl transition-colors">×</button>
                </td>
            `;
        }

        function handleMoney(input) {
            let val = parseNumber(input.value);
            input.value = formatNumber(val);
            calculate();
        }

        function calculate() {
            let sA = 0, sB = 0, sT = 0;
            document.querySelectorAll('.passenger-row').forEach(row => {
                const a = parseNumber(row.querySelector('.val-a').value);
                const b = parseNumber(row.querySelector('.val-b').value);
                const c = parseFloat(row.querySelector('.val-c').value);
                const rt = Math.floor((a + b) * c);
                row.querySelector('.row-total').value = formatNumber(rt);
                sA += a; sB += b; sT += rt;
            });
            document.getElementById('totalFareDisplay').innerText = formatNumber(sA);
            document.getElementById('totalFuelDisplay').innerText = formatNumber(sB);
            document.getElementById('totalApplicationDisplay').innerText = formatNumber(sT);
        }

        async function submitData() {
            const btn = document.getElementById('submitBtn');
            const empId = document.getElementById('employeeId').value.trim();
            const name = document.getElementById('applicantName').value.trim();
            const email = document.getElementById('applicantEmail').value.trim();
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!empId || !name || !email) return alert("필수 정보(사번, 성명, 이메일)를 모두 입력해주세요.");
            if (selectedFiles.length === 0) return alert("증빙 파일(이미지 또는 PDF)을 최소 하나 이상 첨부해주세요.");
            if (!emailPattern.test(email)) return alert("올바른 이메일 형식을 입력해주세요.");

            const confirmSubmit = confirm("신청서를 제출하시겠습니까?");
            if (!confirmSubmit) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>처리 중...';

            try {
                const element = document.getElementById('capture-area');
                const opt = {
                    margin: [0, 10, 0, 10],
                    filename: `[항공권정산]_${name}_${empId}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { 
                        scale: 2, 
                        useCORS: true, 
                        logging: false,
                        width: 950,                            
                        scrollY: 0,           
                        windowHeight: element.scrollHeight,
                        height: element.scrollHeight
                    },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                const pdfBase64 = await html2pdf().set(opt).from(element).outputPdf('datauristring');
                const pdfData = pdfBase64.split(',')[1];

                const toBase64 = file => new Promise(resolve => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve({ name: file.name, type: file.type, base64: reader.result.split(',')[1] });
                });
                const filesData = await Promise.all(selectedFiles.map(toBase64));

                const payload = {
                    applicationDate: document.getElementById('applicationDate').value,
                    employeeId: empId,
                    applicantName: name,
                    applicantEmail: email,
                    totalAmount: parseNumber(document.getElementById('totalApplicationDisplay').innerText),
                    pdfFile: pdfData,
                    files: filesData
                };

                const GAS_URL = 'https://script.google.com/macros/s/AKfycbzg-7MoDyj5yKYNbcupYPVXIq0gLmp4gyeQLmpeC9106uxz78xyevIjFy8yQIuuSh0V/exec';
                const response = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(payload) 
                });
                
                const result = await response.json();

                if (result.success) {
                    alert("✅ 신청서 제출이 완료되었습니다.\n작성하신 이메일로 확인 메일이 발송됩니다.");
                    location.reload();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                alert("제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.\n사유: " + err.message);
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '신청서 제출 및 PDF 전송';
            }
        }
    </script>
</body>
</html>
